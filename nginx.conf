events {
    worker_connections 1024;
}

http {

    server_tokens off;

    # ── Cloudflare Real IP ────────────────────────────────────
    # Sumber: https://www.cloudflare.com/ips-v4/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── Bad Bot Fingerprinting ────────────────────────────────
    map $http_user_agent $is_hacking_tool {
        default     0;
        ~*sqlmap    1;
        ~*nikto     1;
        ~*nmap      1;
        ~*masscan   1;
        ~*zgrab     1;
        ~*nuclei    1;
        ~*dirbuster 1;
        ~*gobuster  1;
    }

    # ── Rate Limit Zones ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=honeypot:10m  rate=5r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=3r/m;

    # ── Format Log JSON ───────────────────────────────────────
    log_format json_threat escape=json
        '{'
            '"time":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"ua":"$http_user_agent",'
            '"tool":$is_hacking_tool'
        '}';

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── DNS Resolver Docker Swarm ─────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ════════════════════════════════════════════════════════
    # SERVER UTAMA
    # ════════════════════════════════════════════════════════
    server {
        listen 80;

        # ── Honeypot: Tangkap Penyerang ───────────────────────
        location ~* ^/(\.env|\.git|wp-admin|wp-login\.php|admin|phpMyAdmin) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            # buffer=off: log langsung tulis ke disk, cegah race condition
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=off flush=1s;
            return 403;
        }

        # ── Blokir file tersembunyi ───────────────────────────
        location ~ /\. {
            deny all;
        }

        # ── Dashboard: Basic Auth + Rate Limit + Proxy ────────
        location / {
            limit_req zone=dashboard burst=5 nodelay;
            limit_req_status 429;

            auth_basic "Bangun Karya SOC";
            auth_basic_user_file /etc/nginx/.htpasswd;

            add_header X-Robots-Tag "noindex, nofollow" always;

            # "dashboard" = nama service di dokploy-network
            # Ganti dengan nama container dashboard lo jika berbeda
            set $dash dashboard;
            proxy_pass http://$dash:3002;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }

    # ── Catch-all: blokir akses via IP langsung ───────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
