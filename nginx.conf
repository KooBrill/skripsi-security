events {
    worker_connections 1024;
}

http {
    server_tokens off;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    map $http_user_agent $is_hacking_tool {
        default     0;
        ~*sqlmap    1;
        ~*nikto     1;
        ~*nmap      1;
        ~*masscan   1;
        ~*zgrab     1;
        ~*nuclei    1;
        ~*dirbuster 1;
        ~*gobuster  1;
    }

    limit_req_zone $binary_remote_addr zone=honeypot:10m  rate=5r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=30r/m;

    log_format json_threat escape=json
        '{'
            '"time":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"ua":"$http_user_agent",'
            '"tool":$is_hacking_tool'
        '}';

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # ════════════════════════════════════════════════════════
    # SERVER 1: Aplikasi Utama (bankar.muimsa.tech)
    # ════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name bankar.muimsa.tech;

        # ── Cek Ban via Python API ─────────────────────────────
        auth_request /ban-check;

        # Ambil header info ban dari response Python
        auth_request_set $ban_count  $upstream_http_x_ban_count;
        auth_request_set $ban_duration $upstream_http_x_ban_duration;
        auth_request_set $ban_ttl    $upstream_http_x_ban_ttl;

        error_page 403 = @banned;

        location @banned {
            # Redirect ke halaman banned.html dengan info lengkap
            return 302 /banned.html?ip=$remote_addr&ban_count=$ban_count&duration=$ban_duration&ttl=$ban_ttl;
        }

        location = /banned.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /ban-check {
            internal;
            proxy_pass http://python-analyzer:8080/check?ip=$remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # ── Honeypot ──────────────────────────────────────────
        location ~* ^/(\.env|\.git|wp-admin|wp-login\.php|admin|phpMyAdmin) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
            return 403;
        }

        location ~ /\.(?!env|git) {
            deny all;
        }

        location / {
            set $upstream websitebankar-buangkar-tcvwj0.1.ra3ozzphkjpjkmshcw8cq5469;
            proxy_pass http://$upstream:3001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }

    # ════════════════════════════════════════════════════════
    # SERVER 2: Dashboard (dashboard.muimsa.tech)
    # ════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name dashboard.muimsa.tech;

        location /_next/static/ {
            auth_basic "Bangun Karya SOC";
            auth_basic_user_file /etc/nginx/htpasswd/.htpasswd;
            proxy_pass http://10.0.1.44:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            limit_req zone=dashboard burst=20 nodelay;
            limit_req_status 429;
            auth_basic "Bangun Karya SOC";
            auth_basic_user_file /etc/nginx/htpasswd/.htpasswd;
            add_header X-Robots-Tag "noindex, nofollow" always;
            proxy_pass http://10.0.1.44:3002;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
