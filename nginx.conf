events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # ════════════════════════════════════════════════════
    # ✅ Real IP dari Traefik/Dokploy (Wajib biar gak nyatet IP 10.x.x.x)
    # ════════════════════════════════════════════════════
    set_real_ip_from 10.0.0.0/8;        # Docker Swarm/Overlay
    set_real_ip_from 172.16.0.0/12;     # Docker Bridge
    set_real_ip_from 192.168.0.0/16;    # Local Network
    set_real_ip_from 127.0.0.1;         # Localhost
    
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Bad Bot Fingerprinting ────────────────────────────
    map $http_user_agent $is_hacking_tool {
        default 0;
        ~*sqlmap 1;
        ~*nikto 1;
        ~*nmap 1;
        ~*masscan 1;
        ~*zgrab 1;
        ~*nuclei 1;
        ~*dirbuster 1;
        ~*gobuster 1;
        ~*wfuzz 1;
        ~*ffuf 1;
    }

    # ── Rate Limit Zones ──────────────────────────────────
    limit_req_zone $binary_remote_addr zone=honeypot:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=30r/m;

    # ── Format Log JSON ───────────────────────────────────
    log_format json_threat escape=json
        '{'
            '"time":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"xff":"$http_x_forwarded_for",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"ua":"$http_user_agent",'
            '"tool":$is_hacking_tool,'
            '"referer":"$http_referer"'
        '}';

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── DNS Resolver Docker Swarm ─────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ════════════════════════════════════════════════════════
    # SERVER UTAMA (Honeypot + Dashboard)
    # ════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name dashboard.muimsa.tech;

        # ── Honeypot: Tier 1 (Kritis) ─────────────────────
        location ~* ^/(\.env|\.env\.local|\.env\.production|\.git|\.git/config|\.git/HEAD|\.svn|\.hg) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
            return 403;
        }

        # ── Honeypot: Tier 2 (Tinggi) ─────────────────────
        location ~* ^/(wp-config\.php|config\.php|id_rsa|\.pem|\.key|\.sql|\.bak|\.zip|\.tar\.gz|phpMyAdmin|pma|adminer) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
            return 403;
        }

        # ── Honeypot: Tier 3 (Sedang) ─────────────────────
        location ~* ^/(wp-admin|wp-login\.php|administrator|admin|panel|phpinfo\.php|server-status|xmlrpc\.php|graphql|swagger|api-docs) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
            return 403;
        }

        # ── Honeypot: Tier 4 (Rendah) ─────────────────────
        location ~* ^/(Dockerfile|docker-compose\.yml|aws-credentials|\.aws|actuator|debug|jenkins|grafana|kibana) {
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
            return 403;
        }

        # ── Blokir file tersembunyi lainnya ───────────────
        location ~ /\. {
            deny all;
        }

        # ── Dashboard: Basic Auth + Rate Limit + Proxy ────
        location / {
            limit_req zone=dashboard burst=20 nodelay;
            limit_req_status 429;
            auth_basic "Bangun Karya SOC";
            auth_basic_user_file /etc/nginx/.htpasswd;
            add_header X-Robots-Tag "noindex, nofollow" always;
            
            proxy_pass http://layer7-layer7das-eumhfq:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ── Catch-all: Log sebagai honeypot ───────────────────
    server {
        listen 80 default_server;
        server_name _;
        
        # Catat semua request yang tidak match domain (IP direct scan)
        access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=4k flush=1s;
        return 444;
    }
}
